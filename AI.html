<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sellora AI Assistant</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f8fafc;
    color:#0f172a;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:50px 20px;
}

h1{
    color:#1e3a8a;
    margin-bottom:30px;
    text-align:center;
}

#aiContainer{
    width:100%;
    max-width:500px;
    background:white;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

#messages{
    max-height:300px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:8px;
}

.user-msg{
    align-self:flex-end;
    background:#7c3aed;
    color:white;
    padding:8px 12px;
    border-radius:12px;
    max-width:80%;
}

.ai-msg{
    align-self:flex-start;
    background:#e2e8f0;
    color:#0f172a;
    padding:8px 12px;
    border-radius:12px;
    max-width:80%;
}

#inputContainer{
    display:flex;
    gap:10px;
    margin-top:10px;
}

#msgInput{
    flex:1;
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
    outline:none;
}

#sendBtn{
    padding:10px 18px;
    border:none;
    background:#7c3aed;
    color:white;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

#sendBtn:hover{
    background:#5b21b6;
}
</style>
</head>

<body>

<h1>Sellora AI Assistant</h1>

<div id="aiContainer">
    <div id="messages"></div>
    <div id="inputContainer">
        <input id="msgInput" placeholder="Savol yozing...">
        <button id="sendBtn">Yuborish</button>
    </div>
</div>

<script>
const API_KEY = "AIzaSyBrE6Ol1-lhXxyYV8nk4dc27a-_dgsR1xk";
const ENDPOINT = "https://generativelanguage.googleapis.com/v1beta2/models/text-bison-001:generate";

async function fetchAIResponse(question){
    try {
        const res = await fetch(`${ENDPOINT}?key=${API_KEY}`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                prompt: {
                    text: question
                },
                maxOutputTokens: 200
            })
        });

        const data = await res.json();
        if(data.candidates && data.candidates.length > 0){
            return data.candidates[0].content;
        } else {
            return "AI javobi olishda xatolik yuz berdi.";
        }
    } catch(e){
        console.error(e);
        return "AI bilan bog‘lanishda xatolik yuz berdi.";
    }
}

const msgInput=document.getElementById("msgInput");
const sendBtn=document.getElementById("sendBtn");
const messages=document.getElementById("messages");

async function sendMessage(){
    const text=msgInput.value.trim();
    if(!text) return;

    // user message
    const userDiv=document.createElement("div");
    userDiv.className="user-msg";
    userDiv.innerText=text;
    messages.appendChild(userDiv);
    messages.scrollTop=messages.scrollHeight;

    msgInput.value="";

    // AI response placeholder
    const aiDiv=document.createElement("div");
    aiDiv.className="ai-msg";
    aiDiv.innerText="AI javobi kutilyapti...";
    messages.appendChild(aiDiv);
    messages.scrollTop=messages.scrollHeight;

    const response = await fetchAIResponse(text);
    aiDiv.innerText = response;
    messages.scrollTop=messages.scrollHeight;
}

sendBtn.addEventListener("click", sendMessage);
msgInput.addEventListener("keypress", e=>{
    if(e.key==="Enter") sendMessage();
});
</script>

</body>
</html>
